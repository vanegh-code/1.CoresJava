<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parte Dos Me Gusta</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="navbar">
        <h1>Network</h1>
    </header>

    <main class="container">
        
        <aside class="izquierda">
            <div class="tarjetaPerfil">
                <div class="avatar">
                    <img src="imagenes/avatar.webp" alt="avatar">
                </div>
                <h2>Adrien Desplatz</h2>
            </div>
        </aside>

        <section class="derecha">
            <h2 class="feed-title">Your Feed</h2>

            <article class="tarjeta1">
                <div class="nombre">
                    <h3>Linn O.</h3>
                    <div class="likes-control">
                        <span class="contarLikes">0 like(s)</span>
                        <button class="btn-like">Like</button>
                    </div>
                </div>
                <p class="contenido">
                    Acabo de configurar este nuevo bot de Discord, cuéntenme que opinan ustedes. <a href="#">link</a>
                </p>
            </article>

            <article class="tarjeta2">
                <div class="nombre">
                    <h3>Lina K.</h3>
                    <div class="likes-control">
                        <span class="contarLikes">0 like(s)</span>
                        <button class="btn-like">Like</button>
                    </div>
                </div>
                <p class="contenido">
                    Acabo de terminar este <a href="#">nuevo comic</a>, denle un vistazo.
                </p>
            </article>

            <article class="tarjeta3">
                <div class="nombre">
                    <h3>Mateo H.</h3>
                    <div class="likes-control">
                        <span class="contarLikes">0 like(s)</span>
                        <button class="btn-like">Like</button>
                    </div>
                </div>
                <p class="contenido">
                    No puedo dejar de escuchar este <a href="#">album</a>. ¿A quién más le gusta?
                </p>
            </article>

        </section>
    </main>
    <script src="main.js" defer></script>
</body>
</html>
